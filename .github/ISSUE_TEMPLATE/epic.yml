name: Epic
description: Track a high-level deliverable in Aurora (with sub-issues for progress).
title: "[Epic] <short summary here>"
labels: [epic]
body:
  - type: markdown
    attributes:
      value: |
        🔖 Please follow our standards before creating or assigning this issue:

        - [Issue & PR Naming Conventions](https://aurora.gccloudone.alpha.canada.ca/en/team/standard-operating-procedures/issue-naming/)
        - [Issue Tracking](https://aurora.gccloudone.alpha.canada.ca/en/team/standard-operating-procedures/issue-tracking/)

  - type: textarea
    id: summary
    attributes:
      label: Epic Summary
      description: As a [type of user], I want [goal or need], so that [benefit or value].
      placeholder: As a Developer, I want to integrate Chainguard into GC Secure Artifacts, so that the GC supply chain is secured.
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Define measurable conditions for completion of this epic.
      placeholder: |
        - [ ] All workloads migrated to Workload Identity
        - [ ] Documentation updated in TechDocs
        - [ ] Cluster add-ons redeployed without downtime

  - type: textarea
    id: decisions
    attributes:
      label: Decisions
      description: Include statements re changes in direction, technical / business decisions made impacting the epic.
      placeholder: Due to shifting management priorities, this issue is no longer flagged as high priority.
    validations:
      required: false

  - type: input
    id: quarter
    attributes:
      label: Target Quarter
      description: Planned quarter (e.g., Q4 2025, Q1 2026). This will map to the Aurora Project iteration.
      placeholder: Q4 2025

  - type: input
    id: client
    attributes:
      label: Client / Partner
      description: Department, SSC Field, or Project Team this epic benefits (e.g., STC, SSC-Aurora).
      placeholder: STC
